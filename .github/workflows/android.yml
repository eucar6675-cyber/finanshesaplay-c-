name: Android APK Generator

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create Complete Android Project
      run: |
        # Eski bozuk dosyaları tamamen siler
        rm -rf app settings.gradle build.gradle gradlew gradle

        # Klasörleri sıfırdan kurar
        mkdir -p app/src/main/java/com/example/karzararhesapla
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values

        # Senin oluşturduğun Kotlin ve XML dosyalarını güvenlice içeri taşır
        if [ -f MainActivity.kt ]; then cp MainActivity.kt app/src/main/java/com/example/karzararhesapla/; fi
        if [ -f activity_main.xml ]; then cp activity_main.xml app/src/main/res/layout/; fi

        # Sistem dosyalarını yazar
        echo 'rootProject.name = "FinansHesaplayici"' > settings.gradle
        echo 'include ":app"' >> settings.gradle

        cat << 'EOF' > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.1.1'
                classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.10'
            }
        }
        allprojects {
            repositories { google(); mavenCentral() }
        }
        EOF

        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
            id 'org.jetbrains.kotlin.android'
        }
        android {
            namespace 'com.example.karzararhesapla'
            compileSdk 33
            defaultConfig {
                applicationId "com.example.karzararhesapla"
                minSdk 24
                targetSdk 33
                versionCode 1
                versionName "1.0"
            }
            buildTypes {
                release {
                    minifyEnabled false
                }
            }
        }
        dependencies {
            implementation 'androidx.core:core-ktx:1.9.0'
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.9.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
        }
        EOF

        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application
                android:allowBackup="true"
                android:label="Midas Hesapla"
                android:supportsRtl="true"
                android:theme="@style/Theme.MaterialComponents.DayNight.NoActionBar">
                <activity
                    android:name="com.example.karzararhesapla.MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        cat << 'EOF' > app/src/main/res/values/themes.xml
        <resources>
            <style name="Theme.FinansHesaplayici" parent="Theme.MaterialComponents.DayNight.NoActionBar" />
        </resources>
        EOF

        # Tam Yetkili Kurulum
        gradle wrapper --gradle-version 8.1.1
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: FinansHesaplayici-APK
        path: app/build/outputs/apk/debug/app-debug.apk
